{% extends 'staff_template/base_template.html' %}

{% block page_title %}
View Update Attendance
{% endblock page_title %}

{% block main_content %}

<section class="content">

    <div class="container-fluid">

        <div class="row">

            <div class="col-md-12">

                <div class="card card-primary">

                    <div class="card-header">

                        <h3 class="card-title">
                            View Update Attendance
                        </h3>

                    </div>

                    <div class="card-body">

                        <!-- SUBJECT -->

                        <div class="form-group">

                            <label>Subject</label>

                            <select class="form-control"
                                    name="subject"
                                    id="subject">

                                {% for subject in subjects %}

                                <option value="{{ subject.id }}">
                                    {{ subject.subject_name }}
                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <!-- SESSION YEAR -->

                        <div class="form-group">

                            <label>Session Year</label>

                            <select class="form-control"
                                    name="session_year_id"
                                    id="session_year_id">

                                {% for session_year in session_year_id %}

                                <option value="{{ session_year.id }}">

                                    {{ session_year.session_start_year }}
                                    TO
                                    {{ session_year.session_end_year }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <!-- YEAR -->

                        <div class="form-group">

                            <label>Year</label>

                            <select class="form-control"
                                    name="year"
                                    id="year">

                                <option value="FY">
                                    First Year
                                </option>

                                <option value="SY">
                                    Second Year
                                </option>

                                <option value="TY">
                                    Third Year
                                </option>

                                <option value="Final">
                                    Final Year
                                </option>

                            </select>

                        </div>

                        <!-- DIVISION -->

                        <div class="form-group">

                            <label>Division</label>

                            <select class="form-control"
                                    name="division"
                                    id="division">

                                <option value="A">
                                    A Division
                                </option>

                                <option value="B">
                                    B Division
                                </option>

                            </select>

                        </div>

                        <!-- FETCH ATTENDANCE -->

                        <div class="form-group">

                            <button type="button"
                                    class="btn btn-primary btn-block"
                                    id="fetch_attendance">

                                Fetch Attendance Date

                            </button>

                        </div>

                        <!-- ATTENDANCE DATE -->

                        <div class="form-group"
                             id="attendance_block"
                             style="display:none">

                            <label>Attendance Date</label>

                            <select class="form-control"
                                    name="attendance_date"
                                    id="attendance_date">

                            </select>

                        </div>

                        <!-- FETCH STUDENT -->

                        <div class="form-group"
                             id="fetch_student_block"
                             style="display:none">

                            <button type="button"
                                    class="btn btn-primary btn-block"
                                    id="fetch_student">

                                Fetch Student Data

                            </button>

                        </div>

                    </div>

                    <!-- STUDENT DATA -->

                    <div id="student_data"
                         class="card-footer">

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock main_content %}



{% block custom_js %}

<script>

$(document).ready(function(){



    // =========================================
    // FETCH ATTENDANCE DATES
    // =========================================

    $("#fetch_attendance").click(function(){

        var subject = $("#subject").val();

        var session_year = $("#session_year_id").val();

        var year = $("#year").val();

        var division = $("#division").val();

        $.ajax({

            url:'{% url "get_attendance_dates" %}',

            type:'POST',

            data:{
                subject:subject,
                session_year_id:session_year,
                year:year,
                division:division
            },

        })

        .done(function(response){

            var json_data = JSON.parse(response);

            var div_data = "<option value=''>Select Attendance Date</option>";

            for(key in json_data){

                div_data += "<option value='";

                div_data += json_data[key]['id'];

                div_data += "'>";

                div_data += json_data[key]['attendance_date'];

                div_data += "</option>";

            }

            $("#attendance_date").html(div_data);

            $("#attendance_block").show();

            $("#fetch_student_block").show();

        })

        .fail(function(){

            alert("Error in Fetching Attendance");

        });

    });



    // =========================================
    // FETCH STUDENT ATTENDANCE
    // =========================================

    $("#fetch_student").click(function(){

        var attendance_date = $("#attendance_date").val();

        $.ajax({

            url:'{% url "get_attendance_student" %}',

            type:'POST',

            data:{
                attendance_date:attendance_date
            },

        })

        .done(function(response){

            var json_data = JSON.parse(response);

            var div_data = "";

            div_data += "<table class='table table-bordered table-striped'>";

            div_data += "<thead class='bg-primary'>";

            div_data += "<tr>";

            div_data += "<th>Roll No</th>";

            div_data += "<th>Student Name</th>";

            div_data += "<th>Present</th>";

            div_data += "</tr>";

            div_data += "</thead>";

            div_data += "<tbody>";

            for(key in json_data){

                div_data += "<tr>";

                /* ROLL NUMBER */

                div_data += "<td>";

                div_data += json_data[key]['roll_no'];

                div_data += "</td>";

                /* STUDENT NAME */

                div_data += "<td>";

                div_data += json_data[key]['name'];

                div_data += "</td>";

                /* CHECKBOX */

                div_data += "<td>";

                div_data += "<input type='checkbox' ";

                if(json_data[key]['status']){

                    div_data += "checked='checked' ";

                }

                div_data += "name='student_data[]' ";

                div_data += "value='"+json_data[key]['id']+"'>";

                div_data += "</td>";

                div_data += "</tr>";

            }

            div_data += "</tbody>";

            div_data += "</table>";

            /* SAVE BUTTON */

            div_data += "<div class='form-group mt-3'>";

            div_data += "<button ";

            div_data += "id='save_attendance' ";

            div_data += "class='btn btn-success btn-block' ";

            div_data += "type='button'>";

            div_data += "Update Attendance";

            div_data += "</button>";

            div_data += "</div>";

            $("#student_data").html(div_data);

        })

        .fail(function(){

            alert("Error in Fetching Student");

        });

    });



    // =========================================
    // SAVE UPDATED ATTENDANCE
    // =========================================

    $(document).on("click","#save_attendance",function(){

        $(this).attr("disabled","disabled");

        $(this).text("Saving Attendance Data...");

        var student_data = $("input[name='student_data[]']").map(function(){

            if($(this).is(":checked")){

                return {
                    "id":$(this).val(),
                    "status":1
                };

            }
            else{

                return {
                    "id":$(this).val(),
                    "status":0
                };

            }

        }).get();

        var attendance_date = $("#attendance_date").val();

        student_data = JSON.stringify(student_data);

        $.ajax({

            url:'{% url "save_updateattendance_data" %}',

            type:'POST',

            data:{
                student_ids:student_data,
                attendance_date:attendance_date
            },

        })

        .done(function(response){

            if(response=="OK"){

                alert("Attendance Updated Successfully");

            }
            else{

                alert("Error in Saving Data");

            }

            location.reload();

        })

        .fail(function(){

            alert("Error in Saving Student");

        });

    });

});

</script>

{% endblock custom_js %}
